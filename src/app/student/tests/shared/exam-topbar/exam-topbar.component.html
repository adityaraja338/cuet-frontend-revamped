<header class="exam-topbar">
  <div class="exam-topbar__lead">
    <p class="exam-topbar__eyebrow">
      {{ (testType | titlecase) || 'Test' }} · Exam mode
    </p>
    <h1 class="exam-topbar__title">{{ title || 'Test' }}</h1>
    <p class="exam-topbar__meta">
      Question
      <span class="exam-topbar__meta-index">{{ currentIndex + 1 }}</span>
      of
      <span class="exam-topbar__meta-total">{{ total || 0 }}</span>
      · {{ answered }} answered
    </p>
  </div>

  <div class="exam-topbar__progress" aria-label="Progress">
    <div class="exam-topbar__progress-track">
      <div
        class="exam-topbar__progress-fill"
        [style.width.%]="progressPercent"
      ></div>
    </div>
    <span class="exam-topbar__progress-label">{{ progressPercent }}%</span>
  </div>

  <div class="exam-topbar__timer" [class]="'exam-topbar__timer--' + timerUrgency">
    <span class="exam-topbar__timer-label">Time left</span>
    @if (countdownTime) {
      <nz-countdown
        class="exam-topbar__timer-value"
        [nzValue]="countdownTime"
        nzFormat="HH:mm:ss"
        (nzCountdownFinish)="timeUp.emit()"
      ></nz-countdown>
    } @else {
      <span class="exam-topbar__timer-value exam-topbar__timer-value--placeholder">
        --:--:--
      </span>
    }
  </div>

  <button
    class="exam-topbar__palette-btn"
    type="button"
    (click)="openPalette.emit()"
    aria-label="Open question palette"
  >
    <span nz-icon nzType="appstore" nzTheme="outline"></span>
    <span>Palette</span>
  </button>
</header>
